<div class="medicos-page">
  <div class="page-header">
    <h1>Médicos</h1>
    <button mat-raised-button color="primary" (click)="abrirFormulario()">
      <mat-icon>add</mat-icon> Agregar Médico
    </button>
  </div>

  <mat-card>
    <mat-card-content>
      <div *ngIf="loading" class="loading-center">
        <mat-spinner diameter="40"></mat-spinner>
      </div>

      <table *ngIf="!loading" mat-table [dataSource]="medicos" class="full-width">
        <ng-container matColumnDef="nombre">
          <th mat-header-cell *matHeaderCellDef>Nombre</th>
          <td mat-cell *matCellDef="let m">{{ m.nombre }}</td>
        </ng-container>

        <ng-container matColumnDef="especialidad">
          <th mat-header-cell *matHeaderCellDef>Especialidad</th>
          <td mat-cell *matCellDef="let m">
            <mat-chip>{{ m.especialidad }}</mat-chip>
          </td>
        </ng-container>

        <ng-container matColumnDef="email">
          <th mat-header-cell *matHeaderCellDef>Email</th>
          <td mat-cell *matCellDef="let m">{{ m.email || '—' }}</td>
        </ng-container>

        <ng-container matColumnDef="telefono">
          <th mat-header-cell *matHeaderCellDef>Teléfono</th>
          <td mat-cell *matCellDef="let m">{{ m.telefono || '—' }}</td>
        </ng-container>

        <ng-container matColumnDef="acciones">
          <th mat-header-cell *matHeaderCellDef>Acciones</th>
          <td mat-cell *matCellDef="let m">
            <button mat-icon-button color="primary" (click)="abrirFormulario(m)" matTooltip="Editar">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button color="warn" (click)="eliminar(m)" matTooltip="Desactivar">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>

      <div *ngIf="!loading && medicos.length === 0" class="empty-state">
        <mat-icon>medical_services</mat-icon>
        <p>No hay médicos registrados</p>
      </div>
    </mat-card-content>
  </mat-card>
</div>
